name: Daily Compliance Alerts

on:
  schedule:
    # Runs at 08:00 UTC every single day
    - cron: '0 8 * * *'
  workflow_dispatch: # This allows you to manually click a "Run" button in GitHub for testing!

jobs:
  run-alerts:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psycopg2-binary
        
    - name: Run Alerter Script
      # This pulls your secure secrets from GitHub and feeds them into the Python script
      env:
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      run: python alerter.py